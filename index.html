<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Clock</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0a0f, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
}

/* 🌑 Giant Moon */
.moon {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #1a1a2e, #000);
    border-radius: 50%;
    filter: blur(2px);
    opacity: 0.25;
    animation: breathe 6s ease-in-out infinite;
}

/* Glow ring */
.moon::after {
    content: "";
    position: absolute;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent);
}

/* 🌌 Breathing animation */
@keyframes breathe {
    0%, 100% {
        transform: scale(1);
        opacity: 0.25;
    }
    50% {
        transform: scale(1.05);
        opacity: 0.35;
    }
}

/* Clock container */
.clock-container {
    text-align: center;
    z-index: 2;
}

/* Time */
#clock {
    font-size: 80px;
    letter-spacing: 5px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* Date */
#date {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.7;
}

/* Toggle button */
button {
    margin-top: 20px;
    padding: 8px 15px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    border-radius: 10px;
    transition: 0.3s;
}

button:hover {
    background: rgba(255,255,255,0.2);
}
</style>
</head>

<body>

<div class="moon"></div>

<div class="clock-container">
    <div id="clock">00:00:00</div>
    <div id="date">Loading...</div>
    <button onclick="toggleFormat()">Toggle 12/24h</button>
</div>

<script>
let is24Hour = true;

function updateClock() {
    const now = new Date();

    let hours = now.getHours();
    let minutes = now.getMinutes();
    let seconds = now.getSeconds();

    let ampm = "";

    if (!is24Hour) {
        ampm = hours >= 12 ? " PM" : " AM";
        hours = hours % 12 || 12;
    }

    hours = String(hours).padStart(2, '0');
    minutes = String(minutes).padStart(2, '0');
    seconds = String(seconds).padStart(2, '0');

    document.getElementById("clock").textContent =
        `${hours}:${minutes}:${seconds}${ampm}`;

    const options = { weekday: 'long', day: 'numeric', month: 'long' };
    document.getElementById("date").textContent =
        now.toLocaleDateString(undefined, options);
}

function toggleFormat() {
    is24Hour = !is24Hour;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
