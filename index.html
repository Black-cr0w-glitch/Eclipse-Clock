<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eclipse Clock V3 - Cinematic</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0a0a0f, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow: hidden;
    perspective: 1000px;
}

/* Background shift */
body::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at center, #0a0a0f, #000000);
    animation: backgroundShift 30s linear infinite;
    z-index: -2;
}
@keyframes backgroundShift {
    0% { transform: translate(-25%, -25%) scale(1); }
    50% { transform: translate(0%, 0%) scale(1.02); }
    100% { transform: translate(-25%, -25%) scale(1); }
}

/* Stars */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
    z-index: -1;
}
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: twinkle 2s infinite alternate;
}
@keyframes twinkle {
    0% { opacity: 0.2; }
    50% { opacity: 1; }
    100% { opacity: 0.2; }
}

/* Moon */
.moon {
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, #1a1a2e, #000);
    border-radius: 50%;
    opacity: 0.25;
    transition: transform 0.1s ease-out;
}

/* Container */
.container {
    display: flex;
    gap: 40px;
    z-index: 2;
    transform-style: preserve-3d;
}

/* Clock */
.clock-container {
    text-align: center;
    transform-style: preserve-3d;
    transition: transform 0.1s ease-out;
}
#clock {
    font-size: 70px;
    letter-spacing: 4px;
    transition: opacity 0.3s ease, transform 0.3s ease;
    text-shadow: 0 0 15px rgba(255,255,255,0.25);
}
.clock-glow {
    animation: glowPulse 1s ease;
}
@keyframes glowPulse {
    0% { text-shadow: 0 0 10px rgba(255,255,255,0.2); }
    50% { text-shadow: 0 0 25px rgba(255,255,255,0.5); }
    100% { text-shadow: 0 0 10px rgba(255,255,255,0.2); }
}
#date {
    margin-top: 8px;
    font-size: 15px;
    opacity: 0.6;
    letter-spacing: 1px;
}

/* Timer */
.timer {
    text-align: center;
}
#timerDisplay {
    font-size: 30px;
    margin-top: 10px;
}
button {
    margin-top: 10px;
    padding: 8px 12px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

/* Tasks */
.tasks {
    width: 200px;
}
.tasks input {
    width: 100%;
    padding: 5px;
    margin-top: 10px;
}
.tasks ul {
    list-style: none;
    padding: 0;
}
.tasks li {
    margin-top: 5px;
    font-size: 14px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

/* Focus mode */
.focus-mode .clock-container,
.focus-mode .tasks {
    display: none;
}
.focus-mode .timer {
    transform: scale(1.5);
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="moon"></div>

<div class="container">
    <!-- Clock -->
    <div class="clock-container">
        <div id="clock"></div>
        <div id="date"></div>
        <button onclick="toggleFormat()">Toggle 12/24h</button>
    </div>

    <!-- Timer -->
    <div class="timer">
        <h3>Focus</h3>
        <div id="timerDisplay">25:00</div>
        <button onclick="startTimer()">Start</button>
        <button onclick="resetTimer()">Reset</button>
        <button onclick="toggleFocusMode()">Focus Mode</button>
        <div id="sessionCount">Sessions: 0</div>
    </div>

    <!-- Tasks -->
    <div class="tasks">
        <h3>Tasks</h3>
        <input id="taskInput" placeholder="Add task...">
        <ul id="taskList"></ul>
    </div>
</div>

<script>
// 🌌 Generate stars
const starsContainer = document.getElementById("stars");
for (let i = 0; i < 80; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.style.top = Math.random() * 100 + "%";
    star.style.left = Math.random() * 100 + "%";
    star.style.animationDuration = (Math.random() * 2 + 1) + "s";
    starsContainer.appendChild(star);
}

// ⏰ Clock
let is24Hour = localStorage.getItem("format") === "24";
function updateClock() {
    const now = new Date();
    let h = now.getHours();
    let m = now.getMinutes();
    let s = now.getSeconds();
    let ampm = "";
    if (!is24Hour) {
        ampm = h >= 12 ? " PM" : " AM";
        h = h % 12 || 12;
    }

    const newTime = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}${ampm}`;

    const clockEl = document.getElementById("clock");
    clockEl.style.opacity = 0;
    clockEl.style.transform = "translateY(5px)";
    setTimeout(() => {
        clockEl.textContent = newTime;
        clockEl.style.opacity = 1;
        clockEl.style.transform = "translateY(0)";
        clockEl.classList.add("clock-glow");
        setTimeout(() => clockEl.classList.remove("clock-glow"), 300);
    }, 150);

    document.getElementById("date").textContent = now.toDateString();
}
function toggleFormat() {
    is24Hour = !is24Hour;
    localStorage.setItem("format", is24Hour ? "24" : "12");
}
setInterval(updateClock, 1000);
updateClock();

// 🔒 Focus Mode
function toggleFocusMode() {
    document.body.classList.toggle("focus-mode");
}

// ⏳ Timer + Session Counter
let time = 1500;
let interval;
let sessions = localStorage.getItem("sessions") || 0;
document.getElementById("sessionCount").textContent = "Sessions: " + sessions;

function startTimer() {
    clearInterval(interval);
    interval = setInterval(() => {
        if (time > 0) time--;
        else {
            clearInterval(interval);
            sessions++;
            localStorage.setItem("sessions", sessions);
            document.getElementById("sessionCount").textContent = "Sessions: " + sessions;
            alert("Focus session complete 🔥");
            time = 1500; updateTimer();
        }
        updateTimer();
    }, 1000);
}

function resetTimer() { clearInterval(interval); time = 1500; updateTimer(); }
function updateTimer() {
    let m = Math.floor(time / 60), s = time % 60;
    document.getElementById("timerDisplay").textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// 📝 Tasks
const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
function renderTasks() {
    taskList.innerHTML = "";
    tasks.forEach((t,i)=>{
        let li = document.createElement("li");
        li.textContent = t;
        li.onclick = () => {
            li.style.opacity = "0"; li.style.transform="translateX(20px)";
            li.style.transition = "0.3s";
            setTimeout(()=>{tasks.splice(i,1); saveTasks();},300);
        };
        taskList.appendChild(li);
    });
}
function saveTasks() { localStorage.setItem("tasks", JSON.stringify(tasks)); renderTasks(); }
taskInput.addEventListener("keypress", e=>{ if(e.key==="Enter" && taskInput.value){ tasks.push(taskInput.value); taskInput.value=""; saveTasks(); }});
renderTasks();

// 🎬 Cinematic Parallax
document.addEventListener("mousemove", e => {
    const x = (e.clientX/window.innerWidth-0.5)*20;
    const y = (e.clientY/window.innerHeight-0.5)*20;
    document.querySelector(".moon").style.transform = `translate(${x}px,${y}px) scale(1.05)`;
    document.querySelector(".clock-container").style.transform = `translate(${x/2}px,${y/2}px)`;
});
</script>
</body>
</html>
